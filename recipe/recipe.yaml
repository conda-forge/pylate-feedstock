context:
  version: "1.3.2"

package:
  name: pylate
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/p/pylate/pylate-${{ version }}.tar.gz
    sha256: 266f7b1a8165cd8df0a5cf49e5e2d85e6fef7be511a49ec2424640cede9a599d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install .

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - sentence-transformers ==3.4.1
    - datasets >=2.20.0
    - accelerate >=0.31.0
    - voyager >=2.0.9
    - sqlitedict >=2.1.0
    - pandas >=2.2.1
    - transformers ==4.48.2
tests:
  - python:
      imports:
        - pylate
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/lightonai/pylate
  license: MIT
  summary: A library for training and retrieval with ColBERT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - moritzwilksch
