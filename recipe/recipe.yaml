context:
  version: 1.4.0
  python_min: "3.10"

package:
  name: pylate
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/p/pylate/pylate-${{ version }}.tar.gz
  sha256: 84195153f7c99bdb57dd9d773cfdd0a1fe9dfab0b06da0d8dd79621f7c0d550d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install .

requirements:
  host:
  - python ${{ python_min }}.*
  - pip
  - setuptools
  - setuptools-scm
  - wheel
  run:
  - python >=${{ python_min }}
  - sentence-transformers ==5.1.1
  - datasets >=2.20.0
  - accelerate >=0.31.0
  - sqlitedict >=2.1.0
  - pandas >=2.2.1
  - transformers >=4.41.0,<4.56.3
  - ujson ==5.10.0
  - ninja >=1.11.1,<1.12
  - fastkmeans ==0.5.0
  # Upstream caps fast-plaid below 1.3.1, but conda-forge only publishes 1.4.6.
  - fast-plaid >=1.4.6,<1.5
tests:
- python:
    imports:
    - pylate
    python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/lightonai/pylate
  license: MIT
  summary: A library for training and retrieval with ColBERT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - moritzwilksch
